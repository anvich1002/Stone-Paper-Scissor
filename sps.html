<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Stone Paper Scissors Game </title>
    <link rel="stylesheet" href="sps.css">
</head>
<body>
    <h1>Stone Paper Scissors</h1>
    <div class = choices>
        
        <div class = "choice"  id = "scissors">
            <img src = "Scissor.jpeg" />
        </div>
        
        <div class = "choice"  id = "paper">
            <img src = "Paper.jpeg" />
        </div>
        
        <div class = "choice" id = "stone">
            <img src = "Stone.jpeg" />
        </div>
    </div>
        
    <div class = "score-board">
        <div class ="score">
        <p id ="user-score">0</p>
        <p>User</p>
        </div> 
        
        <div class = "score">
        <p id ="computer-score">0</p>
        <p>Computer</p>
        </div>
    </div> 

    <div class = "msg-container">
    <p id = "msg">Result!</p>
    </div>
</body>
<script src="sps.js"></script>
</html>
